[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    unit: testes unitarios rapidos (sem IO externo)
    integration: testes que precisam de Kafka/Ollama
filterwarnings =
    ignore::DeprecationWarning